services:
  postgres:
    image: postgres:16-alpine
    container_name: hkn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hkn_platform}
      POSTGRES_USER: ${POSTGRES_USER:-hkn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hkn_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hkn} -d ${POSTGRES_DB:-hkn_platform}"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hkn-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: ${BACKEND_PORT:-3000}
      INGESTION_SECRET: ${INGESTION_SECRET:-dev_secret_change_me}
      DATABASE_URL: postgresql://${POSTGRES_USER:-hkn}:${POSTGRES_PASSWORD:-hkn_pass}@postgres:5432/${POSTGRES_DB:-hkn_platform}
      INGEST_DATA_DIR: ${INGEST_DATA_DIR:-data}
    ports:
      - "${BACKEND_PORT:-3000}:${BACKEND_PORT:-3000}"

volumes:
  postgres_data:
